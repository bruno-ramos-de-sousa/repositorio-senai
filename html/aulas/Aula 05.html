<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula-05</title>
    <style>
        th {
            padding: 8px; 
            text-align: center; 
            border: 1px solid#ccc;
        }
        td {
            padding: 8px; 
            text-align: left; 
            border: 1px solid#ccc;
        }
    </style>
</head>
<body>
    <h1>Tabelas - Otimizando nossa estrutura</h1>
    <table style="width: 80%; border: 1px solid black; border-collapse: collapse;">
        <thead style="background-color: #000;">
            <tr style="color: #fff;"> <!--Table Row (Linhas da tabela)-->
                <th>Nome</th> <!--Table Header (Cabeçalho da tabela)-->
                <th>Endereço</th>
                <th>Cidade</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>João Felicia</td>
                <td>Rua Primavera, nº 200, Vila Flores</td>
                <td>Ituruma</td>
                <td>MG</td>
            </tr>
            <tr>
                <td>Maria das Graças Oliveira</td>
                <td>Av. Brasil, nº100 Centro</td>
                <td>Ituiutaba</td>
                <td>MG</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Código</td>
                <td>20-AD33</td>
            </tr>
        </tfoot>
    </table>
    
</body>
</html>
